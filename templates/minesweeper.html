<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <title>지뢰찾기 | AgeCalc</title>
    <meta name="description" content="안전한 칸을 모두 찾아 지뢰를 피하는 클래식 지뢰찾기 미니게임입니다." />
    <link rel="canonical" href="https://agecalc.cloud/minigames/minesweeper" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="AgeCalc" />
    <meta property="og:title" content="지뢰찾기 | AgeCalc" />
    <meta property="og:description" content="클래식 지뢰찾기 퍼즐 게임" />
    <meta property="og:url" content="https://agecalc.cloud/minigames/minesweeper" />
    <meta property="og:image" content="{{ url_for('static', filename='images/og-image.png', _external=True) }}" />

    <link rel="icon" href="/favicon.ico">
    <link rel="icon" href="{{ url_for('static', filename='images/favicon-32x32.png') }}" sizes="32x32" />
    <link rel="icon" href="{{ url_for('static', filename='images/favicon-16x16.png') }}" sizes="16x16" />
    <link rel="apple-touch-icon" sizes="180x180"
        href="{{ url_for('static', filename='images/apple-touch-icon.png') }}" />
    <link rel="manifest" href="{{ url_for('static', filename='images/site.webmanifest') }}" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/minesweeper.css') }}" />
    <script src="{{ url_for('static', filename='js/analytics.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/clarity-init.js') }}" defer></script>
    {% include 'partials/adsense.html' %}
</head>

<body>
    <div id="pixel-background"></div>
    <div class="container">
        {% include 'partials/header.html' %}

        <h1>지뢰찾기</h1>
        <p class="minesweeper-subtitle">안전한 칸을 모두 열고 지뢰를 피해 보세요.</p>

        <section class="mini-game">
            <div class="game-panel minesweeper-panel" aria-live="polite">
                <div class="minesweeper-status" id="minesweeper-status">안전한 칸을 모두 찾으세요.</div>
                <div class="minesweeper-board" id="minesweeper-board" role="grid" aria-label="지뢰찾기 보드"></div>
                <div class="minesweeper-controls">
                    <button type="button" class="game-btn" id="minesweeper-reset">새 게임</button>
                </div>
                <p class="game-tip">좌클릭: 열기 / 우클릭: 깃발 표시</p>
            </div>
        </section>

        {% include 'partials/footer.html' %}
    </div>

    <div class="cookie-banner" id="cookie-banner">
        <div class="cookie-content">
            <p>서비스 품질 개선과 방문 통계 확인을 위해 쿠키를 사용합니다. 동의 여부는 아래에서 선택할 수 있으며, 거부해도 주요 기능은 그대로 이용할 수 있습니다.</p>
            <div class="cookie-buttons">
                <button id="accept-cookies" class="btn btn-primary">동의</button>
                <button id="reject-cookies" class="btn btn-secondary">거부</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/cookie-consent.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/scroll-top.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/minesweeper-game.js') }}" defer></script>

    <button id="scroll-top" class="scroll-top-btn" title="맨 위로">↑</button>
    <script src="{{ url_for('static', filename='js/pixel-stickers.js') }}" defer></script>
</body>

</html>
