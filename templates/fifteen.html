<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>15 퍼즐 | AgeCalc</title>
    <meta name="description" content="숫자 타일을 순서대로 맞추는 15 퍼즐 게임입니다." />
    <link rel="canonical" href="https://agecalc.cloud/minigames/fifteen" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="AgeCalc" />
    <meta property="og:title" content="15 퍼즐 | AgeCalc" />
    <meta property="og:description" content="4x4 타일을 정렬하는 슬라이딩 퍼즐" />
    <meta property="og:url" content="https://agecalc.cloud/minigames/fifteen" />
    <meta property="og:image" content="{{ url_for('static', filename='images/og-image.png', _external=True) }}" />
    <link rel="icon" href="/favicon.ico">
    <link rel="icon" href="{{ url_for('static', filename='images/favicon-32x32.png') }}" sizes="32x32" />
    <link rel="icon" href="{{ url_for('static', filename='images/favicon-16x16.png') }}" sizes="16x16" />
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='images/apple-touch-icon.png') }}" />
    <link rel="manifest" href="{{ url_for('static', filename='images/site.webmanifest') }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/fifteen.css') }}" />
    <script src="{{ url_for('static', filename='js/analytics.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/clarity-init.js') }}" defer></script>
    {% include 'partials/adsense.html' %}
</head>

<body>
    <div id="pixel-background"></div>
    <div class="container">
        {% include 'partials/header.html' %}

        <h1>15 퍼즐</h1>
        <p class="fifteen-subtitle">빈칸 옆 숫자만 움직일 수 있습니다. 1부터 15까지 순서대로 맞춰보세요.</p>

        <section class="mini-game">
            <div class="game-panel fifteen-panel" aria-live="polite">
                <div id="fifteen-status" class="fifteen-status">타일을 순서대로 정렬하세요.</div>
                <div id="fifteen-board" class="fifteen-board"></div>
                <div class="fifteen-controls">
                    <button id="fifteen-shuffle" class="game-btn" type="button">섞기</button>
                </div>
                <div id="fifteen-moves" class="fifteen-moves">이동 횟수: 0</div>
            </div>
        </section>

        {% include 'partials/footer.html' %}
    </div>

    <div class="cookie-banner" id="cookie-banner">
        <div class="cookie-content">
            <p>서비스 품질 개선과 방문 통계 확인을 위해 쿠키를 사용합니다. 동의 여부는 아래에서 선택할 수 있으며, 거부해도 주요 기능은 그대로 이용할 수 있습니다.</p>
            <div class="cookie-buttons">
                <button id="accept-cookies" class="btn btn-primary">동의</button>
                <button id="reject-cookies" class="btn btn-secondary">거부</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/cookie-consent.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/scroll-top.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/fifteen-game.js') }}" defer></script>

    <button id="scroll-top" class="scroll-top-btn" title="맨 위로">↑</button>
    <script src="{{ url_for('static', filename='js/pixel-stickers.js') }}" defer></script>
</body>

</html>
