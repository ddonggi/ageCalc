<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="google-adsense-account" content="ca-pub-7818333740838556">
    <title>블랙잭 | AgeCalc</title>
    <meta name="description" content="딜러와 21에 가까운 점수를 겨루는 클래식 블랙잭 게임입니다." />
    <link rel="canonical" href="https://agecalc.cloud/minigames/blackjack" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="AgeCalc" />
    <meta property="og:title" content="블랙잭 | AgeCalc" />
    <meta property="og:description" content="딜러와 승부하는 카드 게임" />
    <meta property="og:url" content="https://agecalc.cloud/minigames/blackjack" />
    <meta property="og:image" content="{{ url_for('static', filename='images/og-image.png', _external=True) }}" />
    <link rel="icon" href="/favicon.ico">
    <link rel="icon" href="{{ url_for('static', filename='images/favicon-32x32.png') }}" sizes="32x32" />
    <link rel="icon" href="{{ url_for('static', filename='images/favicon-16x16.png') }}" sizes="16x16" />
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='images/apple-touch-icon.png') }}" />
    <link rel="manifest" href="{{ url_for('static', filename='images/site.webmanifest') }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/blackjack.css') }}" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-M0RLS343N4"></script>
    <script src="{{ url_for('static', filename='js/analytics.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/clarity-init.js') }}" defer></script>
    {% include 'partials/adsense.html' %}
</head>
<body>
    <div id="pixel-background"></div>
    <div class="container">
        {% include 'partials/header.html' %}
        <h1>블랙잭</h1>
        <p class="game-sub">21에 더 가까운 점수를 만들어 딜러를 이기세요.</p>
        <section class="mini-game"><div class="game-panel card-panel" aria-live="polite">
            <div class="game-status" id="bj-status">Deal 버튼으로 시작하세요.</div>
            <section class="hand"><h3>딜러</h3><div class="cards" id="bj-dealer-cards"></div><div class="score" id="bj-dealer-score">점수: ?</div></section>
            <section class="hand"><h3>플레이어</h3><div class="cards" id="bj-player-cards"></div><div class="score" id="bj-player-score">점수: 0</div></section>
            <div class="game-controls"><button class="game-btn" id="bj-deal" type="button">Deal</button><button class="game-btn" id="bj-hit" type="button" disabled>Hit</button><button class="game-btn" id="bj-stand" type="button" disabled>Stand</button><button class="game-btn" id="bj-new" type="button">New</button></div>
        </div></section>
        {% include 'partials/footer.html' %}
    </div>
    <div class="cookie-banner" id="cookie-banner"><div class="cookie-content"><p>이 웹사이트는 쿠키를 사용하여 사용자 경험을 개선합니다. 계속 사용하시면 쿠키 사용에 동의하는 것으로 간주됩니다.</p><div class="cookie-buttons"><button id="accept-cookies" class="btn btn-primary">동의</button><button id="reject-cookies" class="btn btn-secondary">거부</button></div></div></div>
    <script src="{{ url_for('static', filename='js/cookie-consent.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/scroll-top.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/blackjack-game.js') }}" defer></script>
    <button id="scroll-top" class="scroll-top-btn" title="맨 위로">↑</button>
    <script src="{{ url_for('static', filename='js/pixel-stickers.js') }}" defer></script>
</body>
</html>
