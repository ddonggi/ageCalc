<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="google-adsense-account" content="ca-pub-7818333740838556">
    <title>만칼라 | AgeCalc</title>
    <meta name="description" content="돌을 뿌려 저장소 점수를 쌓는 클래식 만칼라 게임입니다." />
    <link rel="canonical" href="https://agecalc.cloud/minigames/mancala" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="AgeCalc" />
    <meta property="og:title" content="만칼라 | AgeCalc" />
    <meta property="og:description" content="돌을 배분하며 점수를 쌓는 전략 보드 게임" />
    <meta property="og:url" content="https://agecalc.cloud/minigames/mancala" />
    <meta property="og:image" content="{{ url_for('static', filename='images/og-image.png', _external=True) }}" />
    <link rel="icon" href="/favicon.ico">
    <link rel="icon" href="{{ url_for('static', filename='images/favicon-32x32.png') }}" sizes="32x32" />
    <link rel="icon" href="{{ url_for('static', filename='images/favicon-16x16.png') }}" sizes="16x16" />
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='images/apple-touch-icon.png') }}" />
    <link rel="manifest" href="{{ url_for('static', filename='images/site.webmanifest') }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mancala.css') }}" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-M0RLS343N4"></script>
    <script src="{{ url_for('static', filename='js/analytics.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/clarity-init.js') }}" defer></script>
    {% include 'partials/adsense.html' %}
</head>

<body>
    <div id="pixel-background"></div>
    <div class="container">
        {% include 'partials/header.html' %}

        <h1>만칼라</h1>
        <p class="mancala-subtitle">돌을 배분해 저장소 점수를 쌓으세요. 마지막 돌 위치에 따라 한 번 더 둘 수 있습니다.</p>

        <section class="mini-game">
            <div class="game-panel mancala-panel" aria-live="polite">
                <div id="mancala-status" class="mancala-status">플레이어 1이 먼저 시작합니다.</div>
                <div class="mancala-board">
                    <div class="mancala-store" id="mancala-store-p2" aria-label="플레이어 2 저장소">0</div>
                    <div class="mancala-rows">
                        <div class="mancala-row" id="mancala-row-p2" aria-label="플레이어 2 구멍"></div>
                        <div class="mancala-row" id="mancala-row-p1" aria-label="플레이어 1 구멍"></div>
                    </div>
                    <div class="mancala-store" id="mancala-store-p1" aria-label="플레이어 1 저장소">0</div>
                </div>
                <div class="mancala-controls">
                    <button id="mancala-reset" class="game-btn" type="button">리셋</button>
                </div>
            </div>
        </section>

        {% include 'partials/footer.html' %}
    </div>

    <div class="cookie-banner" id="cookie-banner">
        <div class="cookie-content">
            <p>이 웹사이트는 쿠키를 사용하여 사용자 경험을 개선합니다. 계속 사용하시면 쿠키 사용에 동의하는 것으로 간주됩니다.</p>
            <div class="cookie-buttons">
                <button id="accept-cookies" class="btn btn-primary">동의</button>
                <button id="reject-cookies" class="btn btn-secondary">거부</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/cookie-consent.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/scroll-top.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/mancala-game.js') }}" defer></script>

    <button id="scroll-top" class="scroll-top-btn" title="맨 위로">↑</button>
    <script src="{{ url_for('static', filename='js/pixel-stickers.js') }}" defer></script>
</body>

</html>
