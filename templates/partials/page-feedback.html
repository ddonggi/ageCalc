<section class="page-feedback" data-page-feedback="{{ page_path }}" aria-labelledby="page-feedback-title">
    <div class="page-feedback-copy">
        <p class="eyebrow">페이지 의견</p>
        <h2 id="page-feedback-title">이 페이지가 도움이 됐나요?</h2>
        <p>남겨주신 반응은 페이지 설명과 계산 흐름을 개선하는 데만 참고합니다.</p>
    </div>
    <div class="page-feedback-actions" role="group" aria-label="페이지 도움 여부">
        <button class="btn btn-secondary page-feedback-button" type="button" data-feedback-vote="helpful">도움됨</button>
        <button class="btn btn-secondary page-feedback-button" type="button" data-feedback-vote="unhelpful">아쉬움</button>
    </div>
    <p class="page-feedback-status" aria-live="polite"></p>
</section>
