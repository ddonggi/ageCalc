{% if coupang_partners_enabled %}
<section class="section-shell coupang-affiliate-block coupang-affiliate-baby">
    <div class="coupang-product-grid">
        <a class="coupang-product-card" href="https://link.coupang.com/a/eDqzcGE02m" target="_blank" rel="sponsored nofollow noopener" referrerpolicy="unsafe-url">
            <img src="https://image14.coupangcdn.com/image/affiliate/banner/efb674425bc822bb44966c84130312be@2x.jpg" alt="" width="120" height="240">
        </a>
    </div>
    {% if coupang_active_baby_promotions %}
    <div class="coupang-promo-grid">
        {% for promotion in coupang_active_baby_promotions %}
        <a class="coupang-promo-card" href="{{ promotion.url }}" target="_blank" rel="sponsored nofollow noopener" referrerpolicy="unsafe-url">
            <img src="{{ promotion.image_url }}" alt="" loading="lazy">
        </a>
        {% endfor %}
    </div>
    {% endif %}
    <p class="coupang-disclosure">이 포스팅은 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.</p>
</section>
{% endif %}
