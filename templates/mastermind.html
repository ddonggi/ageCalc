<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="google-adsense-account" content="ca-pub-7818333740838556">
    <title>마스터마인드 | AgeCalc</title>
    <meta name="description" content="숨겨진 4색 조합을 추리하는 마스터마인드 퍼즐 게임입니다." />
    <link rel="canonical" href="https://agecalc.cloud/minigames/mastermind" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="AgeCalc" />
    <meta property="og:title" content="마스터마인드 | AgeCalc" />
    <meta property="og:description" content="색 조합을 추리하는 코드 브레이킹 퍼즐" />
    <meta property="og:url" content="https://agecalc.cloud/minigames/mastermind" />
    <meta property="og:image" content="{{ url_for('static', filename='images/og-image.png', _external=True) }}" />
    <link rel="icon" href="/favicon.ico">
    <link rel="icon" href="{{ url_for('static', filename='images/favicon-32x32.png') }}" sizes="32x32" />
    <link rel="icon" href="{{ url_for('static', filename='images/favicon-16x16.png') }}" sizes="16x16" />
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='images/apple-touch-icon.png') }}" />
    <link rel="manifest" href="{{ url_for('static', filename='images/site.webmanifest') }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mastermind.css') }}" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-M0RLS343N4"></script>
    <script src="{{ url_for('static', filename='js/analytics.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/clarity-init.js') }}" defer></script>
    {% include 'partials/adsense.html' %}
</head>

<body>
    <div id="pixel-background"></div>
    <div class="container">
        {% include 'partials/header.html' %}

        <h1>마스터마인드</h1>
        <p class="mastermind-subtitle">4가지 색 순서를 맞혀 보세요. 최대 10번까지 추리할 수 있습니다.</p>

        <section class="mini-game">
            <div class="game-panel mastermind-panel" aria-live="polite">
                <div id="mastermind-status" class="mastermind-status">10번 안에 숨은 조합을 맞혀보세요.</div>
                <div class="mastermind-slots" id="mastermind-slots" aria-label="현재 추리"></div>
                <div class="mastermind-palette" id="mastermind-palette" aria-label="색상 선택"></div>
                <div class="mastermind-controls">
                    <button id="mastermind-clear" class="game-btn" type="button">지우기</button>
                    <button id="mastermind-submit" class="game-btn" type="button" disabled>제출</button>
                    <button id="mastermind-new" class="game-btn" type="button">새 게임</button>
                </div>
                <ul class="mastermind-history" id="mastermind-history" aria-label="추리 기록"></ul>
                <div id="mastermind-secret" class="mastermind-secret" aria-live="polite"></div>
            </div>
        </section>

        {% include 'partials/footer.html' %}
    </div>

    <div class="cookie-banner" id="cookie-banner">
        <div class="cookie-content">
            <p>이 웹사이트는 쿠키를 사용하여 사용자 경험을 개선합니다. 계속 사용하시면 쿠키 사용에 동의하는 것으로 간주됩니다.</p>
            <div class="cookie-buttons">
                <button id="accept-cookies" class="btn btn-primary">동의</button>
                <button id="reject-cookies" class="btn btn-secondary">거부</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/cookie-consent.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/scroll-top.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/mastermind-game.js') }}" defer></script>

    <button id="scroll-top" class="scroll-top-btn" title="맨 위로">↑</button>
    <script src="{{ url_for('static', filename='js/pixel-stickers.js') }}" defer></script>
</body>

</html>
